name: Run Command on Stateful Generator
run-name: "Remote exec: ${{ inputs.command }}"

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Shell command to execute"
        required: true
        type: string
      timeout:
        description: "Timeout in minutes"
        required: false
        type: number
        default: 30

jobs:
  exec:
    runs-on: stateful-generator
    timeout-minutes: ${{ fromJson(inputs.timeout || '30') }}
    steps:
      - name: Execute command
        run: |
          COMMAND="${{ inputs.command || 'ls -la /mnt/sda' }}"
          echo "::group::Command"
          echo "$COMMAND"
          echo "::endgroup::"
          echo "::group::Output"
          eval "$COMMAND"
          echo "::endgroup::"
