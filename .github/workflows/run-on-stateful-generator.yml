name: Run Command on Stateful Generator
run-name: "Remote exec: ${{ inputs.command }}"

on:
  push:
    branches:
      - stateful-runner-interaction
  workflow_dispatch:
    inputs:
      command:
        description: "Shell command to execute"
        required: true
        type: string
      timeout:
        description: "Timeout in minutes"
        required: false
        type: number
        default: 30

jobs:
  exec:
    runs-on: stateful-generator
    timeout-minutes: ${{ fromJson(inputs.timeout || '720') }}
    steps:
      - name: Execute command
        run: |
          COMMAND="${{ inputs.command || 'rm -rf /mnt/sda/jochemnet && mkdir -p /mnt/sda/jochemnet/nethermind && cd /mnt/sda/jochemnet/nethermind && echo \"Downloading and extracting snapshot...\" && curl -fL https://snapshots.ethpandaops.io/jochemnet/nethermind/24402727/snapshot.tar.zst | zstd -d --threads=0 | tar xf - && echo \"Done. Contents:\" && ls -la /mnt/sda/jochemnet/nethermind/' }}"
          echo "::group::Command"
          echo "$COMMAND"
          echo "::endgroup::"
          echo "::group::Output"
          eval "$COMMAND"
          echo "::endgroup::"
