name: Generate Stateful Tests
run-name: "Generate Stateful Tests [repricings_${{ inputs.mode || 'compute' }}/${{ inputs.chain || 'mainnet' }}]"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Test mode (auto-sets payload_dir, test_path, eest_mode)"
        required: true
        type: choice
        options:
          - compute
          - stateful
        default: "compute"
      chain:
        description: "Target network"
        required: true
        type: choice
        options:
          - mainnet
          - perf-devnet-2
          - perf-devnet-3
        default: "mainnet"
      nethermind_image:
        description: "Nethermind Docker image"
        required: true
        default: "nethermindeth/nethermind:testing-rpc"
      fork:
        description: "Fork name"
        required: true
        default: "Osaka"
      chainspec_file:
        description: "Custom Nethermind chainspec file from scripts/genesisfiles/nethermind/ (leave empty to use built-in config)"
        required: false
        type: choice
        options:
          - ""
          - "generator-amsterdam.json"
        default: ""
      eest_repo:
        description: "execution-specs repository"
        required: true
        default: "https://github.com/ethereum/execution-specs"
      eest_branch:
        description: "execution-specs branch"
        required: true
        default: "forks/amsterdam"
      eest_commit:
        description: "Pin execution-specs to a specific commit SHA (optional, leave empty for branch HEAD)"
        required: false
        default: ""
      gas_benchmark_values:
        description: "Comma-separated benchmark values"
        required: true
        default: "30,60,90,120,150,180,210,240,270,300"
      gas_bump_count:
        description: "Gas bump count (-1 = chain default: 5000 for perf-devnet-2/3, 10000 for mainnet)"
        required: true
        default: "-1"
      parameter_filter:
        description: "pytest -k filter expression (e.g. 'test_add_op or test_mul_op')"
        required: false
        default: ""
      eest_mode:
        description: "EEST mode (leave empty to omit -m flag)"
        required: false
        type: choice
        options:
          - ""
          - repricing
        default: ""
      generation_mode:
        description: "Generation mode"
        required: true
        type: choice
        options:
          - full
          - warmup_only
          - stateful_only
        default: "full"
      nethermind_extra_flags:
        description: "Extra Nethermind CLI flags passed to the container (e.g. '--FlatDb.Enabled=true --Pruning.Mode=None')"
        required: false
        default: ""
      commit_results:
        description: "Commit generated data to the repo"
        required: false
        type: boolean
        default: false
      skip_artifacts:
        description: "Skip uploading artifacts"
        required: false
        type: boolean
        default: false
      push_to_db:
        description: "Upload traces metadata to PostgreSQL"
        required: false
        type: boolean
        default: false
      warmup_snapshot_backend:
        description: "Snapshot backend for warmup generation"
        required: true
        type: choice
        options:
          - overlay
          - zfs
        default: "overlay"

permissions:
  contents: write

jobs:
  generate:
    runs-on: stateful-generator
    timeout-minutes: 720

    env:
      OVERLAY_ROOT: /mnt/sda/overlay-workspace
      TRACES_JSON: traces.json
      DB_HOST: ${{ secrets.PERFNET_0_DB_HOST }}
      DB_PORT: ${{ secrets.PERFNET_0_DB_PORT }}
      DB_USER: ${{ secrets.PERFNET_0_DB_USER }}
      DB_NAME: ${{ secrets.PERFNET_0_DB_NAME }}
      CFG_NETHERMIND_IMAGE: ${{ github.event.inputs.nethermind_image || 'nethermindeth/nethermind:flat' }}
      CFG_FORK: ${{ github.event.inputs.fork || 'Osaka' }}
      CFG_CHAIN: ${{ github.event.inputs.chain || 'mainnet' }}
      CFG_MODE: ${{ github.event.inputs.mode || 'compute' }}
      CFG_PAYLOAD_DIR: ${{ format('repricings_{0}/{1}', github.event.inputs.mode || 'compute', github.event.inputs.chain || 'mainnet') }}
      CFG_TEST_PATH: ${{ (github.event.inputs.mode || 'compute') == 'stateful' && 'tests/benchmark/stateful/' || 'tests/benchmark/compute/' }}
      CFG_EEST_MODE: ${{ github.event.inputs.eest_mode || '' }}
      CFG_EEST_REPO: ${{ github.event.inputs.eest_repo || 'https://github.com/ethereum/execution-specs' }}
      CFG_EEST_BRANCH: ${{ github.event.inputs.eest_branch || 'forks/amsterdam' }}
      CFG_EEST_COMMIT: ${{ github.event.inputs.eest_commit || '' }}
      CFG_GAS_BENCHMARK_VALUES: ${{ github.event.inputs.gas_benchmark_values || '30,60,90,120,150,180,210,240,270,300' }}
      CFG_GAS_BUMP_COUNT: ${{ github.event.inputs.gas_bump_count || '-1' }}
      CFG_RPC_ADDRESS: "0x86cF016FB873D50a7B8F31EB154c9234DD31b058"
      CFG_PARAMETER_FILTER: ${{ github.event.inputs.parameter_filter || '' }}
      CFG_GENERATION_MODE: ${{ github.event.inputs.generation_mode || 'full' }}
      CFG_WARMUP_SNAPSHOT_BACKEND: ${{ github.event.inputs.warmup_snapshot_backend || 'overlay' }}
      CFG_CHAINSPEC_FILE: ${{ github.event.inputs.chainspec_file || '' }}
      CFG_NETHERMIND_EXTRA_FLAGS: ${{ github.event.inputs.nethermind_extra_flags || '' }}

    steps:
      - name: Checkout gas-benchmarks repository from triggering branch
        uses: actions/checkout@v4
        with:
          repository: NethermindEth/gas-benchmarks
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          lfs: true
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare Nethermind tools (Kute)
        shell: bash
        run: |
          set -euo pipefail
          make prepare_tools

      - name: Resolve runtime paths and table naming
        shell: bash
        run: |
          set -euo pipefail

          case "$CFG_CHAIN" in
            mainnet)
              SNAPSHOT_DIR_NM="/mnt/sda/mainnet/nethermind"
              SNAPSHOT_DIR_WARMUP="$SNAPSHOT_DIR_NM"
              EXECUTION_CHAIN="mainnet"
              STUBS_FILE="execution-specs/tests/benchmark/stateful/bloatnet/stubs_mainnet.json"
              ;;
            perf-devnet-2)
              SNAPSHOT_DIR_NM="/mnt/sda/perf-devnet-2/nethermind"
              SNAPSHOT_DIR_WARMUP="$SNAPSHOT_DIR_NM"
              EXECUTION_CHAIN="mainnet"
              STUBS_FILE="execution-specs/tests/benchmark/stateful/bloatnet/stubs_bloatnet.json"
              ;;
            perf-devnet-3)
              SNAPSHOT_DIR_NM="/mnt/sda/perf-devnet-3/nethermind"
              SNAPSHOT_DIR_WARMUP="$SNAPSHOT_DIR_NM"
              EXECUTION_CHAIN="mainnet"
              STUBS_FILE="execution-specs/tests/benchmark/stateful/bloatnet/stubs_bloatnet.json"
              ;;
            *)
              echo "Unsupported chain: $CFG_CHAIN" >&2
              exit 1
              ;;
          esac

          PAYLOAD_DIR="$CFG_PAYLOAD_DIR"
          WARMUP_DIR="${PAYLOAD_DIR}_warmup"
          GAS_BUMP_COUNT="$CFG_GAS_BUMP_COUNT"
          if [[ "$GAS_BUMP_COUNT" == "-1" ]]; then
            if [[ "$CFG_CHAIN" == "perf-devnet-2" || "$CFG_CHAIN" == "perf-devnet-3" ]]; then
              GAS_BUMP_COUNT="5000"
            else
              GAS_BUMP_COUNT="10000"
            fi
          fi

          TABLE_BASE=$(echo "$PAYLOAD_DIR" | tr '[:upper:]' '[:lower:]' | sed -E 's#[/.-]+#_#g; s#[^a-z0-9_]#_#g; s#_+#_#g; s#^_##; s#_$##')
          if [[ -z "$TABLE_BASE" ]]; then
            TABLE_BASE="generated_tests"
          fi
          if [[ "$TABLE_BASE" =~ ^[0-9] ]]; then
            TABLE_BASE="t_${TABLE_BASE}"
          fi

          BRANCH_NAME="${GITHUB_REF_NAME}"
          if [[ "$BRANCH_NAME" != "main" ]]; then
            BRANCH_SUFFIX=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's#[/.-]+#_#g; s#[^a-z0-9_]#_#g; s#_+#_#g; s#^_##; s#_$##')
            DB_TABLE="${TABLE_BASE}_${BRANCH_SUFFIX}_metadata"
          else
            DB_TABLE="${TABLE_BASE}_metadata"
          fi

          echo "SNAPSHOT_DIR_NM=$SNAPSHOT_DIR_NM" >> "$GITHUB_ENV"
          echo "SNAPSHOT_DIR_WARMUP=$SNAPSHOT_DIR_WARMUP" >> "$GITHUB_ENV"
          echo "EXECUTION_CHAIN=$EXECUTION_CHAIN" >> "$GITHUB_ENV"
          echo "STUBS_FILE=$STUBS_FILE" >> "$GITHUB_ENV"
          echo "PAYLOAD_DIR=$PAYLOAD_DIR" >> "$GITHUB_ENV"
          echo "WARMUP_DIR=$WARMUP_DIR" >> "$GITHUB_ENV"
          echo "GAS_BUMP_COUNT=$GAS_BUMP_COUNT" >> "$GITHUB_ENV"
          echo "DB_TABLE=$DB_TABLE" >> "$GITHUB_ENV"

      - name: Clean stale outputs from previous runs on runner
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$CFG_GENERATION_MODE" != "warmup_only" ]]; then
            if [[ -n "$CFG_PARAMETER_FILTER" ]]; then
              echo "parameter_filter is set ('$CFG_PARAMETER_FILTER'); keeping existing $PAYLOAD_DIR to preserve other tests"
            else
              rm -rf "$PAYLOAD_DIR"
            fi
          fi
          if [[ -n "$CFG_PARAMETER_FILTER" ]]; then
            echo "parameter_filter is set; keeping existing $WARMUP_DIR to preserve other warmups"
          else
            rm -rf "$WARMUP_DIR"
          fi
          rm -f "$TRACES_JSON"
          rm -rf execution-specs

      - name: Generate stateful tests
        if: ${{ env.CFG_GENERATION_MODE != 'warmup_only' }}
        shell: bash
        env:
          RPC_SEED_KEY: ${{ secrets.EEST_RPC_SEED_KEY }}
        run: |
          set -euo pipefail
          STATEFUL_GENERATOR_LOG="stateful_generator.log"
          : > "$STATEFUL_GENERATOR_LOG"
          GENESIS_ARGS=()
          if [[ -n "$CFG_CHAINSPEC_FILE" ]]; then
            GENESIS_ARGS=(--genesis-path "scripts/genesisfiles/nethermind/$CFG_CHAINSPEC_FILE")
          fi
          PYTHONUNBUFFERED=1 stdbuf -oL -eL python3 eest_stateful_generator.py \
            --nethermind-image "$CFG_NETHERMIND_IMAGE" \
            --fork "$CFG_FORK" \
            --rpc-seed-key "$RPC_SEED_KEY" \
            --rpc-address "$CFG_RPC_ADDRESS" \
            --test-path "$CFG_TEST_PATH" \
            --payload-dir "$PAYLOAD_DIR" \
            --eest-repo "$CFG_EEST_REPO" \
            --eest-branch "$CFG_EEST_BRANCH" \
            ${CFG_EEST_COMMIT:+--eest-commit "$CFG_EEST_COMMIT"} \
            --eest-clean-clone \
            --gas-bump-count "$GAS_BUMP_COUNT" \
            ${CFG_EEST_MODE:+--eest_mode "$CFG_EEST_MODE"} \
            --gas-benchmark-values "$CFG_GAS_BENCHMARK_VALUES" \
            --stubs-file "$STUBS_FILE" \
            --snapshot-dir "$SNAPSHOT_DIR_NM" \
            --chain "$EXECUTION_CHAIN" \
            "${GENESIS_ARGS[@]}" \
            --overlay-root "$OVERLAY_ROOT" \
            --allow-execute-remote-failures \
            --trace-json \
            --trace-json-output "$TRACES_JSON" \
            ${CFG_PARAMETER_FILTER:+--parameter_filter "$CFG_PARAMETER_FILTER"} \
            ${CFG_NETHERMIND_EXTRA_FLAGS:+--nethermind-extra-flags="$CFG_NETHERMIND_EXTRA_FLAGS"} \
            2>&1 | tee -a "$STATEFUL_GENERATOR_LOG"

      - name: Print stateful generator log
        if: always()
        shell: bash
        run: |
          set +e
          if [ -f stateful_generator.log ]; then
            echo "=== stateful_generator.log (full) ==="
            cat stateful_generator.log
          else
            echo "stateful_generator.log not found"
          fi

      - name: Upload stateful generator log artifact
        if: ${{ always() && github.event.inputs.skip_artifacts != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: stateful-generator-log-${{ github.run_id }}
          path: stateful_generator.log
          if-no-files-found: warn

      - name: Generate warmup tests
        if: ${{ env.CFG_GENERATION_MODE != 'stateful_only' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "$PAYLOAD_DIR" ]]; then
            echo "Payload source directory not found for warmup generation: $PAYLOAD_DIR" >&2
            exit 1
          fi
          GENESIS_ARGS=()
          if [[ -n "$CFG_CHAINSPEC_FILE" ]]; then
            GENESIS_ARGS=(-g "scripts/genesisfiles/nethermind/$CFG_CHAINSPEC_FILE")
          fi
          FILTER_ARGS=()
          if [[ -n "$CFG_PARAMETER_FILTER" ]]; then
            FILTER_ARGS=(--filter "$CFG_PARAMETER_FILTER")
          fi
          python3 make_warmup_tests.py \
            -s "$PAYLOAD_DIR" \
            -d "$WARMUP_DIR" \
            -p "*.txt" \
            "${GENESIS_ARGS[@]}" \
            --snapshotRoot "$SNAPSHOT_DIR_WARMUP" \
            --overlayRoot "$OVERLAY_ROOT" \
            --snapshotBackend "$CFG_WARMUP_SNAPSHOT_BACKEND" \
            --network "mainnet" \
            "${FILTER_ARGS[@]}"

      - name: Print warmup nethermind log
        if: ${{ always() && env.CFG_GENERATION_MODE != 'stateful_only' }}
        shell: bash
        run: |
          set +e
          if [ -f warmup_nethermind.log ]; then
            echo "=== warmup_nethermind.log (full) ==="
            cat warmup_nethermind.log
          else
            echo "warmup_nethermind.log not found"
          fi

      - name: Upload traces metadata to DB
        if: ${{ github.event.inputs.push_to_db == 'true' && env.CFG_GENERATION_MODE != 'warmup_only' }}
        shell: bash
        env:
          DB_PASSWORD: ${{ secrets.PERFNET_0_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ ! -f "$TRACES_JSON" ]; then
            echo "Trace json not found: $TRACES_JSON" >&2
            exit 1
          fi
          python3 fill_tests_metadata_db.py \
            --json-file "$TRACES_JSON" \
            --db-host "$DB_HOST" \
            --db-port "$DB_PORT" \
            --db-user "$DB_USER" \
            --db-password "$DB_PASSWORD" \
            --db-name "$DB_NAME" \
            --table-name "$DB_TABLE"

      - name: Prepare opcodes tracing artifact
        if: ${{ always() && env.CFG_GENERATION_MODE != 'warmup_only' }}
        shell: bash
        run: |
          if [ -f "$TRACES_JSON" ]; then
            cp "$TRACES_JSON" opcodes_tracing.json
          fi

      - name: Upload opcodes tracing artifact
        if: ${{ always() && github.event.inputs.skip_artifacts != 'true' && env.CFG_GENERATION_MODE != 'warmup_only' }}
        uses: actions/upload-artifact@v4
        with:
          name: opcodes-tracing-${{ github.run_id }}
          path: opcodes_tracing.json
          if-no-files-found: warn

      - name: Remove traces file after DB upload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f "$TRACES_JSON"

      - name: Commit generated tests and warmups to triggering branch
        if: ${{ github.event.inputs.commit_results == 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [[ -n "${CFG_PARAMETER_FILTER:-}" ]]; then
            # Only stage files matching the filter terms so unrelated tests are untouched.
            IFS=',' read -ra OR_GROUPS <<< "${CFG_PARAMETER_FILTER// or /,}"
            matches_filter() {
              local fname
              fname="$(echo "$1" | tr '[:upper:]' '[:lower:]')"
              for group in "${OR_GROUPS[@]}"; do
                IFS=' ' read -ra AND_TERMS <<< "${group// and / }"
                local all_match=true
                for term in "${AND_TERMS[@]}"; do
                  term="$(echo "$term" | tr '[:upper:]' '[:lower:]' | xargs)"
                  [[ -z "$term" ]] && continue
                  if [[ "$fname" != *"$term"* ]]; then
                    all_match=false
                    break
                  fi
                done
                if $all_match; then return 0; fi
              done
              return 1
            }
            # Build a lowercase set of gas values being regenerated
            # so we can skip files for other gas sizes.
            IFS=',' read -ra _GAS_VALS <<< "${CFG_GAS_BENCHMARK_VALUES}"
            declare -A GAS_VAL_SET
            for _gv in "${_GAS_VALS[@]}"; do
              GAS_VAL_SET["$(echo "$_gv" | tr '[:upper:]' '[:lower:]' | xargs)"]="1"
            done

            matches_gas_value() {
              # If the filename contains benchmark_XXXM, check it's in the gas set.
              # Files without a benchmark_ tag are always eligible (e.g. _control).
              local fname_lower
              fname_lower="$(echo "$1" | tr '[:upper:]' '[:lower:]')"
              if [[ "$fname_lower" =~ benchmark_([0-9]+) ]]; then
                local val="${BASH_REMATCH[1]}"
                [[ -n "${GAS_VAL_SET[$val]:-}" ]] && return 0
                return 1
              fi
              return 0
            }

            stage_filtered() {
              local dir="$1"
              [ -e "$dir" ] || return 0
              git add "$dir/_control" 2>/dev/null || true
              # Only stage git-tracked changes (new/modified/deleted/renamed)
              # that match the filter AND the gas values being regenerated.
              # IFS= prevents read from stripping leading spaces in porcelain output.
              git status --porcelain -- "$dir" | while IFS= read -r line; do
                # porcelain format: XY filename  or  XY old -> new
                local fpath="${line:3}"
                # Handle renames: "R  old -> new"
                if [[ "$fpath" == *" -> "* ]]; then
                  fpath="${fpath##* -> }"
                fi
                local bname
                bname="$(basename "$fpath")"
                if matches_filter "$bname" && matches_gas_value "$bname"; then
                  git add "$fpath"
                fi
              done
              # Also stage deletions matching filter + gas value
              git ls-files --deleted -- "$dir" | while IFS= read -r f; do
                local bname
                bname="$(basename "$f")"
                if matches_filter "$bname" && matches_gas_value "$bname"; then
                  git add "$f"
                fi
              done
            }
            stage_filtered "$PAYLOAD_DIR"
            stage_filtered "$WARMUP_DIR"
          else
            [ -e "$PAYLOAD_DIR" ] && git add "$PAYLOAD_DIR"
            [ -e "$WARMUP_DIR" ] && git add "$WARMUP_DIR"
          fi

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "chore: generate stateful tests for ${PAYLOAD_DIR}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Push failed after ${attempt} attempts"
              exit 1
            fi
            sleep_seconds=$((attempt * 10))
            echo "Push failed (attempt ${attempt}), retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Print nethermind.log
        if: always()
        shell: bash
        run: |
          set +e
          if [ -f nethermind.log ]; then
            echo "=== nethermind.log (full) ==="
            cat nethermind.log
          else
            echo "nethermind.log not found"
          fi

      - name: Upload generated artifacts
        if: ${{ always() && github.event.inputs.skip_artifacts != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: generated-stateful-tests-${{ github.run_id }}
          path: |
            ${{ env.PAYLOAD_DIR }}
            ${{ env.WARMUP_DIR }}

      - name: Generate run metadata
        if: ${{ always() && github.event.inputs.skip_artifacts != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          GB_COMMIT="${GITHUB_SHA}"
          NM_IMAGE="${CFG_NETHERMIND_IMAGE}"
          NM_DIGEST=$(docker image inspect --format='{{index .RepoDigests 0}}' "$NM_IMAGE" 2>/dev/null || echo "unavailable")
          if [[ -n "${CFG_EEST_COMMIT:-}" ]]; then
            EEST_COMMIT="${CFG_EEST_COMMIT}"
          elif [[ -d "execution-specs/.git" ]]; then
            EEST_COMMIT=$(git -C execution-specs rev-parse HEAD)
          else
            EEST_COMMIT="unknown"
          fi
          python3 -c "
          import json, sys
          json.dump({
              'gas_benchmarks_commit': sys.argv[1],
              'nethermind_image': sys.argv[2],
              'nethermind_image_digest': sys.argv[3],
              'execution_specs_commit': sys.argv[4],
              'execution_specs_repo': sys.argv[5],
              'execution_specs_branch': sys.argv[6]
          }, open('run_metadata.json', 'w'), indent=2)
          " "$GB_COMMIT" "$NM_IMAGE" "$NM_DIGEST" "$EEST_COMMIT" "$CFG_EEST_REPO" "$CFG_EEST_BRANCH"

      - name: Upload run metadata artifact
        if: ${{ always() && github.event.inputs.skip_artifacts != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: run-metadata-${{ github.run_id }}
          path: run_metadata.json
          if-no-files-found: warn

      - name: Kill stale mitmdump and child processes
        if: always()
        shell: bash
        run: |
          set +e
          pkill -f mitmdump || true
          pkill -f mitm_addon || true

      - name: Purge all running Docker containers on runner
        if: always()
        shell: bash
        run: |
          set +e
          docker ps -q | xargs -r docker rm -f
          docker system prune -af --volumes || true

      - name: Purge stale snapshot runtime mounts and dirs
        if: always()
        shell: bash
        run: |
          set +e

          if [ "$CFG_WARMUP_SNAPSHOT_BACKEND" = "zfs" ]; then
            if command -v zfs >/dev/null 2>&1; then
              zfs list -H -o name -t filesystem 2>/dev/null | grep '/gasbench-runtime/' | sort -r | while read -r ds; do
                [ -n "$ds" ] && (zfs destroy -r -f "$ds" || sudo zfs destroy -r -f "$ds" || true)
              done
              zfs list -H -o name -t snapshot 2>/dev/null | grep '@gasbench_tmp_' | while read -r snap; do
                [ -n "$snap" ] && (zfs destroy "$snap" || sudo zfs destroy "$snap" || true)
              done
            fi
            rm -rf "$OVERLAY_ROOT"/nethermind "$OVERLAY_ROOT"/geth || true
          else
            # Warmup overlays: /mnt/sda/overlay-workspace/<client>/<overlay_id>/{merged,upper,work}
            for client in nethermind geth; do
              if [ -d "$OVERLAY_ROOT/$client" ]; then
                find "$OVERLAY_ROOT/$client" -mindepth 2 -maxdepth 2 -type d -name merged | sort -r | while read -r mp; do
                  mountpoint -q "$mp" && (umount "$mp" || umount -l "$mp" || true)
                done
                rm -rf "$OVERLAY_ROOT/$client" || true
              fi
            done
          fi

          # Stateful generator primary overlay mountpoints if a run was interrupted
          for mp in "$OVERLAY_ROOT/overlay-merged" "$OVERLAY_ROOT/scenario-merged"; do
            if [ -d "$mp" ]; then
              mountpoint -q "$mp" && (umount "$mp" || umount -l "$mp" || true)
            fi
          done

          rm -rf \
            "$OVERLAY_ROOT/overlay-upper" \
            "$OVERLAY_ROOT/overlay-work" \
            "$OVERLAY_ROOT/overlay-merged" \
            "$OVERLAY_ROOT/scenario-upper" \
            "$OVERLAY_ROOT/scenario-work" \
            "$OVERLAY_ROOT/scenario-merged" || true
