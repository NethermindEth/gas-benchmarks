name: Generate Stateful Tests

on:
  workflow_dispatch:
    inputs:
      repo_ref:
        description: "Branch/tag/SHA to checkout"
        required: true
        default: "repricing"
      nethermind_image:
        description: "Nethermind Docker image"
        required: true
        default: "nethermindeth/nethermind:testing-rpc"
      fork:
        description: "Fork name"
        required: true
        default: "Osaka"
      chain:
        description: "Chain name (drives snapshot path selection)"
        required: true
        type: choice
        options:
          - mainnet
          - perf-devnet-2
        default: "mainnet"
      payload_dir:
        description: "Output directory for generated tests"
        required: true
        default: "repricings_stateful/bloatnet"
      warmup_dir:
        description: "Output directory for warmup tests"
        required: true
        default: "warmup-repricing-stateful-bloatnet"
      warmup_source:
        description: "Warmup source directory (empty = payload_dir)"
        required: false
        default: ""
      warmup_pattern:
        description: "Warmup source file pattern"
        required: true
        default: "*.txt"
      test_path:
        description: "EEST test path passed to eest_stateful_generator.py"
        required: true
        default: "tests/benchmark/stateful/"
      eest_repo:
        description: "execution-specs repository"
        required: true
        default: "https://github.com/LouisTsai-Csie/execution-specs"
      eest_branch:
        description: "execution-specs branch"
        required: true
        default: "fix-sstore-invariant"
      gas_benchmark_values:
        description: "Comma-separated benchmark values"
        required: true
        default: "30,60,90,120,150,180,210,240,270,300"
      eest_mode:
        description: "EEST mode"
        required: true
        type: choice
        options:
          - stateful
          - repricing
          - benchmark
        default: "stateful"
      stubs_file:
        description: "Path to stubs file in repository"
        required: true
        default: "stubs.json"
      rpc_address:
        description: "RPC funding address"
        required: true
        default: "0x86cF016FB873D50a7B8F31EB154c9234DD31b058"
      overlay_root:
        description: "Overlay workspace path on runner"
        required: true
        default: "/mnt/sda/overlay-workspace"
      traces_json:
        description: "Trace json output path"
        required: true
        default: "traces.json"
      db_host:
        description: "Metadata DB host"
        required: true
        default: "perfnet.core.nethermind.dev"
      db_port:
        description: "Metadata DB port"
        required: true
        default: "5432"
      db_user:
        description: "Metadata DB user"
        required: true
        default: "nethermind"
      db_name:
        description: "Metadata DB name"
        required: true
        default: "monitoring"
      db_table:
        description: "Metadata DB table name"
        required: true
        default: "gas_limit_benchmarks_test_metadata_compute_osaka_bloatnet"

jobs:
  generate:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout gas-benchmarks repository
        uses: actions/checkout@v4
        with:
          repository: NethermindEth/gas-benchmarks
          ref: ${{ inputs.repo_ref }}
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve snapshot paths from chain
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.chain }}" in
            mainnet)
              SNAPSHOT_DIR_NM="/mnt/sda/mainnet/nethermind"
              SNAPSHOT_DIR_GETH="/mnt/sda/mainnet/geth"
              ;;
            perf-devnet-2)
              SNAPSHOT_DIR_NM="/mnt/sda/perf-devnet-2/nethermind"
              SNAPSHOT_DIR_GETH="/mnt/sda/perf-devnet-2/geth"
              ;;
            *)
              echo "Unsupported chain: ${{ inputs.chain }}" >&2
              exit 1
              ;;
          esac
          echo "SNAPSHOT_DIR_NM=$SNAPSHOT_DIR_NM" >> "$GITHUB_ENV"
          echo "SNAPSHOT_DIR_GETH=$SNAPSHOT_DIR_GETH" >> "$GITHUB_ENV"

      - name: Generate stateful tests
        shell: bash
        env:
          RPC_SEED_KEY: ${{ secrets.EEST_RPC_SEED_KEY }}
        run: |
          set -euo pipefail
          python3 eest_stateful_generator.py \
            --nethermind-image "${{ inputs.nethermind_image }}" \
            --fork "${{ inputs.fork }}" \
            --rpc-seed-key "$RPC_SEED_KEY" \
            --rpc-address "${{ inputs.rpc_address }}" \
            --test-path "${{ inputs.test_path }}" \
            --payload-dir "${{ inputs.payload_dir }}" \
            --eest-repo "${{ inputs.eest_repo }}" \
            --eest-branch "${{ inputs.eest_branch }}" \
            --gas-bump-count 0 \
            --eest_mode "${{ inputs.eest_mode }}" \
            --gas-benchmark-values "${{ inputs.gas_benchmark_values }}" \
            --stubs-file "${{ inputs.stubs_file }}" \
            --snapshot-dir "$SNAPSHOT_DIR_NM" \
            --chain "${{ inputs.chain }}" \
            --overlay-root "${{ inputs.overlay_root }}" \
            --trace-json \
            --trace-json-output "${{ inputs.traces_json }}"

      - name: Generate warmup tests
        shell: bash
        run: |
          set -euo pipefail
          WARMUP_SOURCE="${{ inputs.warmup_source }}"
          if [ -z "$WARMUP_SOURCE" ]; then
            WARMUP_SOURCE="${{ inputs.payload_dir }}"
          fi
          python3 make_warmup_tests.py \
            -s "$WARMUP_SOURCE" \
            -d "${{ inputs.warmup_dir }}" \
            -p "${{ inputs.warmup_pattern }}" \
            --snapshotRoot "$SNAPSHOT_DIR_GETH" \
            --overlayRoot "${{ inputs.overlay_root }}" \
            --network "${{ inputs.chain }}"

      - name: Upload traces metadata to DB
        shell: bash
        env:
          DB_PASSWORD: ${{ secrets.METADATA_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ ! -f "${{ inputs.traces_json }}" ]; then
            echo "Trace json not found: ${{ inputs.traces_json }}" >&2
            exit 1
          fi
          python3 fill_tests_metadata_db.py \
            --json-file "${{ inputs.traces_json }}" \
            --db-host "${{ inputs.db_host }}" \
            --db-port "${{ inputs.db_port }}" \
            --db-user "${{ inputs.db_user }}" \
            --db-password "$DB_PASSWORD" \
            --db-name "${{ inputs.db_name }}" \
            --table-name "${{ inputs.db_table }}"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-stateful-tests-${{ github.run_id }}
          path: |
            ${{ inputs.payload_dir }}
            ${{ inputs.warmup_dir }}
            ${{ inputs.traces_json }}
            mitm.log
            mitm_full.log
            mitm_nethermind.log
            nethermind.log
